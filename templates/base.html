<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block title %}Smart Lender - ML Loan Eligibility Prediction{% endblock %}</title>
    <!-- Outfit and Inter Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Outfit:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
    <!-- FontAwesome for Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body>
    <div class="glass-bg"></div>
    <div class="glow-orb" id="orb-1"></div>
    <div class="glow-orb" id="orb-2"></div>

    <header class="navbar">
        <div class="nav-container">
            <a href="{{ url_for('index') }}" class="nav-logo">
                <i class="fa-solid fa-shield-halved logo-icon"></i>
                <span>Smart<span class="highlight">Lender</span></span>
            </a>
            <nav class="nav-links">
                <a href="{{ url_for('index') }}" class="nav-link {% if request.path == '/' %}active{% endif %}">
                    <i class="fa-solid fa-chart-line"></i> Dashboard
                </a>
                <a href="{{ url_for('predict') }}" class="nav-link {% if request.path == '/predict' %}active{% endif %}">
                    <i class="fa-solid fa-file-invoice-dollar"></i> Check Eligibility
                </a>
            </nav>
        </div>
    </header>

    <main class="main-content">
        {% block content %}{% endblock %}
    </main>

    <footer class="footer">
        <p>&copy; 2026 Smart Lender Inc. Empowering credit officers with high-precision classification models.</p>
    </footer>

    <script src="{{ url_for('static', filename='js/app.js') }}"></script>
</body>
</html>
